
[tasks]

  [tasks.build]
    description = "build dashboards"
    outputs = ["dashboards/*.json"]
    run = "bun run src/index.ts --output ../dashboards"
    sources = ["*/src/**"]
    wait_for = [":install:deps", ":check", ":test"]

  [tasks.check]
    description = "lint"
    run = ["bun run tsc", "biome check"]
    wait_for = [":install:deps"]

  [tasks.ci]
    depends = [":install:deps", ":check", ":build", ":test"]
    description = "tasks for CI (build, test, ...)"

  [tasks.format]
    alias = "fmt"
    description = "format"
    run = ["biome format --write", "biome check --write"]
    wait_for = [":install:deps"]

  [tasks."install:deps"]
    run = "bun install"

  [tasks.test]
    depends = [":check"]
    run = "bun test"
    wait_for = [":install:deps"]

[tools]
  biome = "1.9.4"
  bun = "1.3.13"
