
[env]
  NAME = "cdviz-collector"

[tasks]

  [tasks.ci]
    depends = [":lint"]

  [tasks.lint]
    description = "Lint Helm chart"
    run = ["helm dependency update .", "helm lint .", "helm template . | kubectl apply --dry-run=client -f -"]

  [tasks.release_prepare]
    description = "Prepare release (calculate version & generate changelog)"
    run = "VERSION=$(mise run //:_release_version $NAME \"charts/$NAME/*\" Chart.yaml)\nmise run //:_release_changelog $NAME \"charts/$NAME/*\" \"$VERSION\"\necho \"Prepared $NAME $VERSION\"\n"
    shell = "bash -c"

  [tasks.release_publish]
    description = "Publish chart to OCI registry"
    run = "set -euo pipefail\nVERSION=$(yq .version Chart.yaml)\n\nmise run //:_publish_chart \"$NAME\" \"$VERSION\" \"$CHARTS_OCI_REGISTRY\"\nmise run //:_release_tag \"$NAME\" \"$VERSION\"\n"
    shell = "bash -c"

  [tasks.test]
    description = "Test helm chart in k8s cluster"
    run = "set -euxo pipefail\n\nCLUSTER_NAME=\"kind-cdviz-test-$$\"\nNAMESPACE=\"$NAME-test\"\nRELEASE_NAME=\"$NAME-test\"\n\n# Function to cleanup on exit\ncleanup() {\n  echo \"Cleaning up cluster: $CLUSTER_NAME\"\n  kind delete cluster --name \"$CLUSTER_NAME\" || true\n}\ntrap cleanup EXIT\n\n# Create kind cluster\necho \"Creating kind cluster: $CLUSTER_NAME\"\nkind create cluster --name \"$CLUSTER_NAME\" --wait 60s\n\n# Create namespace\nkubectl create namespace \"$NAMESPACE\"\n\n# Update helm dependencies\nhelm dependency update $NAME\n\n# Deploy the chart\necho \"Deploying $NAME chart\"\nhelm upgrade --install \"$RELEASE_NAME\" ./$NAME --namespace \"$NAMESPACE\" --wait --timeout 1m --set kubewatch.enabled=true --set \"kubewatch.cloudevent.url=http://$RELEASE_NAME:8080/webhook/000-kubewatch\"\n\n# Wait for deployment to be ready\necho \"Waiting for $NAME to be ready\"\nkubectl wait --for=condition=ready pod --selector=app.kubernetes.io/name=$NAME --namespace \"$NAMESPACE\" --timeout=300s\n\n# Check readiness probe endpoint\necho \"Testing readiness endpoint\"\nkubectl port-forward \"service/$RELEASE_NAME\" 8080:8080 --namespace \"$NAMESPACE\" &\nPORT_FORWARD_PID=$!\nsleep 5\n\n# Test the readiness endpoint\ncurl -f http://localhost:8080/readyz || {\n  echo \"Readiness check failed\"\n  kill $PORT_FORWARD_PID || true\n  exit 1\n}\n\n# Test the health endpoint\ncurl -f http://localhost:8080/healthz || {\n  echo \"Health check failed\"\n  kill $PORT_FORWARD_PID || true\n  exit 1\n}\n\nkill $PORT_FORWARD_PID || true\n\necho \"✅ $NAME test completed successfully\"\n"
    shell = "bash -c"
    wait_for = [":lint"]

[tools]
  kind = "0.31.0"
  kubectl = "1.35.4"
