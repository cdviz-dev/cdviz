# CDviz Monorepo Configuration
min_version = "2025.10.6"         # "2025.9.7"
experimental_monorepo_root = true

[monorepo]
config_roots = [
  "cdviz-db",
  "cdviz-grafana",
  "cdviz-grafana/dashboards_generator",
  "cdviz-site",
  "charts",
  "charts/*",                           # Individual chart directories
  "demos",
  "demos/*",                            # Single-level glob pattern
  "updatecli",
]

[settings]
experimental = true

[env]
# Shared registry for Helm charts
CHARTS_OCI_REGISTRY = "oci://ghcr.io/cdviz-dev/charts"

[tools]
yq = "4.53.2"                            # used by build to update / normalize dashboards / release
git-cliff = "2.13.1"
"github:updatecli/updatecli" = "0.116.3"

[tasks."updatecli:diff"]
description = "Show what updatecli would update (dry run, no changes)"
run = "GITHUB_TOKEN=$(gh auth token) updatecli diff --config updatecli/updatecli.d/ --values updatecli/values.yaml"

[tasks."updatecli:apply"]
description = "Apply all pending dependency updates via updatecli (creates PRs)"
run = "GITHUB_TOKEN=$(gh auth token) updatecli apply --config updatecli/updatecli.d/ --values updatecli/values.yaml"

[tasks."cdevents:change-branch"]
description = "Change the branch of the cdevents-specs submodules (eg to reflect version update)"
usage = '''
arg "<branch>" {
  help "branch to switch"
  long_help """
  Change the branch of cdevents/spec repository to use for submodule/folder cdevents-specs

  Example:
    mise run //:cdevents:change-branch spec-v0.5
  """
}
'''
run = [
  'git submodule set-branch -b "${usage_branch?}" cdevents-spec',
  "git submodule sync --recursive",
  "git submodule update --init --remote cdevents-spec",
]
