project: cdviz-dev
version: "0.42.2"

registries:
  - host: ghcr.io
  - host: registry-1.docker.io

repositories:
  - url: https://grafana-community.github.io/helm-charts
    name: grafana-community
  # - name: robusta
  #   url: https://robusta-charts.storage.googleapis.com

.options: &options
  create_namespace: true
  atomic: true
  # resetValues: true
  timeout: 5m
  wait: true
  max_history: 3

releases:
  - name: grafana
    namespace: grafana
    chart:
      name: grafana-community/grafana
      version: 11.1.7
    values:
      - ./values/grafana.yaml
    <<: *options
    tags:
      - dashboard
      - pre-req
  - name: cdviz-db
    namespace: cdviz-dev
    chart: ../../charts/cdviz-db
    # chart:
    #   name: oci://ghcr.io/cdviz-dev/charts/cdviz-db
    #   version: 0.0.0
    <<: *options
    create_namespace: false
    values:
      - src: values/secret.yaml
        renderer: copy
        strict: true
      - src: values/cdviz-db.yaml
        renderer: copy
        strict: true
    tags:
      - db
      - cdviz
  - name: cdviz-grafana
    namespace: cdviz-dev
    chart: ../../charts/cdviz-grafana
    # chart:
    #   name: oci://ghcr.io/cdviz-dev/charts/cdviz-grafana
    #   version: 0.0.0
    <<: *options
    create_namespace: false
    values:
      - src: values/secret.yaml
        renderer: copy
        strict: true
      - src: values/cdviz-grafana.yaml
        renderer: copy
        strict: true
    tags:
      - dashboard
      - cdviz
  - name: cdviz-collector
    namespace: cdviz-dev
    chart: ../../charts/cdviz-collector
    # chart:
    #   name: oci://ghcr.io/cdviz-dev/charts/cdviz-collector
    #   version: 0.0.0
    <<: *options
    create_namespace: false
    values:
      - src: values/secret.yaml
        renderer: copy
        strict: true
      - src: values/cdviz-collector.yaml
        renderer: copy
        strict: true
    tags:
      - cdviz
  # - name: kubewatch
