[tools]
# docker / docker compose is not installed by mise :-(

[tasks."up"]
description = "Launch the docker compose demo (in foreground)"
usage = '''
flag "--pull <pull>" {
  help "Pull image before running, do not pull to be able to use locally build container (like cdviz-db-migration)"
  choices "always" "missing" "never"
  default "missing"
}
'''
run = """
  # export MY_UID=$(id -u)
  # export MY_GID=$(id -g)
  docker compose -f docker-compose.yaml up --remove-orphans --pull {{ usage.pull }}
  """

[tasks."down"]
description = "Stop the docker compose demo"
run = """
  # export MY_UID=$(id -u)
  # export MY_GID=$(id -g)
  docker compose -f docker-compose.yaml stop
  """

[tasks."delete"]
description = "Stop & remove the docker compose demo (and local data)"
run = [
  {task = ":down"},
  "docker compose -f docker-compose.yaml rm",
  "rm -rf tmp",
]
