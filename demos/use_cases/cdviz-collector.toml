[pipeline]
queue_capacity = 2000
transformer_refs = [
  "cdevents_v0_3_to_v0_4",
  "cdevents_v0_4_to_v0_5",
  "normalize_names",
]

[sinks.debug]
enabled = true

[sinks.database]
enabled = true
type = "db"
url = "postgresql://cdviz:postgres-password@127.0.0.1:5432/cdviz"
pool_connections_min = 1
pool_connections_max = 10

[sources]
[sources.cdevents_local_json]
enabled = true

[sources.cdevents_local_json.extractor]
type = "opendal"
kind = "fs"
polling_interval = "60s"
parameters = { root = "./events/cdevents.in.d" }
recursive = true
path_patterns = ["*.json"]
parser = "json"

[sources.pipelinerun_x_local_csv]
enabled = true
transformer_refs = ["pipelinerun_x"]  # ["pipelinerun_x", "log"]

[sources.pipelinerun_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["pipelinerun_*.csv"]
parser = "csv_row"

[sources.taskrun_x_local_csv]
enabled = true
transformer_refs = ["taskrun_x"]

[sources.taskrun_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["taskrun_*.csv"]
parser = "csv_row"

[sources.testcaserun_x_local_csv]
enabled = true
transformer_refs = ["testcaserun_x"]

[sources.testcaserun_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["testcaserun_*.csv"]
parser = "csv_row"

[sources.testsuiterun_x_local_csv]
enabled = true
transformer_refs = ["testsuiterun_x"]

[sources.testsuiterun_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["testsuiterun_*.csv"]
parser = "csv_row"

[sources.incident_x_local_csv]
enabled = true
transformer_refs = ["incident_x"]

[sources.incident_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["incident_*.csv"]
parser = "csv_row"

[sources.ticket_x_local_csv]
enabled = true
transformer_refs = ["ticket_x"]

[sources.ticket_x_local_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/executions.d" }
recursive = false
path_patterns = ["ticket_*.csv"]
parser = "csv_row"

[sources.artifact_lifecycle_csv]
enabled = true
transformer_refs = ["artifact_lifecycle"]

[sources.artifact_lifecycle_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/artifact_lifecycle.d" }
recursive = false
path_patterns = ["*.csv"]
parser = "csv_row"

[sources.service_deploys_csv]
enabled = true
transformer_refs = ["service_deploys"]

[sources.service_deploys_csv.extractor]
type = "opendal"
kind = "fs"
polling_interval = "20s"
parameters = { root = "./events/service_deploys.d" }
recursive = false
path_patterns = ["*.csv"]
parser = "csv_row"

[remote.transformers-community]
type = "github"
owner = "cdviz-dev"
repo = "transformers-community"

[transformers]
artifact_lifecycle = { type = "vrl", template_file = "./transformers/artifact_lifecycle.vrl" }
service_deploys = { type = "vrl", template_file = "./transformers/service_deploys.vrl" }
pipelinerun_x = { type = "vrl", template_file = "./transformers/pipelinerun_x.vrl" }
testsuiterun_x = { type = "vrl", template_file = "./transformers/testsuiterun_x.vrl" }
testcaserun_x = { type = "vrl", template_file = "./transformers/testcaserun_x.vrl" }
taskrun_x = { type = "vrl", template_file = "./transformers/taskrun_x.vrl" }
incident_x = { type = "vrl", template_file = "./transformers/incident_x.vrl" }
ticket_x = { type = "vrl", template_file = "./transformers/ticket_x.vrl" }
# github_events = { type = "vrl", template_rfile = "transformers-community:///github_events/to_v0_5.vrl" }
# kubewatch_cloudevents = { type = "vrl", template_rfile = "transformers-community:///kubewatch_cloudevents/to_v0_5.vrl" }
# argocd_notifications = { type = "vrl", template_rfile = "transformers-community:///argocd_notifications/to_v0_5.vrl" }
cdevents_v0_3_to_v0_4 = { type = "vrl", template_rfile = "transformers-community:///cdevents/cdevents_v0_3/to_v0_4.vrl" }
cdevents_v0_4_to_v0_5 = { type = "vrl", template_rfile = "transformers-community:///cdevents/cdevents_v0_4/to_v0_5.vrl" }

[transformers.normalize_names]
type = "vrl"
template = '''
# ellipsis number injected into some pipeline/tasks Name by tools (eg. Dependabot) `#1234` -> `#...`
if exists(.body.subject.content.pipelineName) {
    .body.subject.content.pipelineName = replace!(.body.subject.content.pipelineName, r'(?i)\s#\d+', " #...")
}
if exists(.body.subject.content.taskName) {
    .body.subject.content.taskName = replace!(.body.subject.content.taskName, r'(?i)\s#\d+', " #...")
}
[.]
'''
