---
# Propagate cdviz-collector releases across the monorepo.
#
# When a new release is tagged in cdviz-dev/cdviz-collector, this pipeline
# updates all version references in a single PR:
#   - charts/cdviz-collector/values.yaml  (image.tag)
#   - charts/cdviz-collector/Chart.yaml   (appVersion)
#   - cdviz-site/src/docs/cdviz-collector/install.md   (frontmatter version field)
#   - cdviz-site/src/docs/cdviz-collector/quick-start.md  (installer URL)
#   - demos/use_cases/mise.toml  (tool version)
#   - cdviz-site/mise.toml  (tool version)
name: "bump cdviz-collector version"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"
      commitmessage:
        type: fix
        scope: deps

sources:
  collectorVersion:
    name: "Get latest cdviz-collector release"
    kind: githubrelease
    spec:
      owner: cdviz-dev
      repository: cdviz-collector
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  valuesTag:
    name: "bump cdviz-collector in charts/cdviz-collector/values.yaml"
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: charts/cdviz-collector/values.yaml
      matchpattern: '  tag: [0-9]+\.[0-9]+\.[0-9]+'
      replacepattern: '  tag: {{ source "collectorVersion" }}'

  # FIXME: useless to update the version of the app in the chart as is it override by the "prepare-publish script" used for chart, So first update the script
  # chartAppVersion:
  #   name: "charts/cdviz-collector/Chart.yaml appVersion"
  #   kind: yaml
  #   sourceid: collectorVersion
  #   scmid: default
  #   spec:
  #     file: charts/cdviz-collector/Chart.yaml
  #     key: $.appVersion

  # TODO update the version of the chart (not with the version of the app or container)
  # docsInstallVersion:
  #   name: "docs install.md frontmatter version"
  #   kind: file
  #   sourceid: collectorVersion
  #   scmid: default
  #   spec:
  #     file: cdviz-site/src/docs/cdviz-collector/install.md
  #     matchpattern: 'version: [0-9]+\.[0-9]+\.[0-9]+'
  #     replacepattern: 'version: {{ source "collectorVersion" }}'

  # docsQuickStartUrl:
  #   name: "bump cdviz-collector in cdviz-site/src/docs/cdviz-collector/quick-start.md"
  #   kind: file
  #   sourceid: collectorVersion
  #   scmid: default
  #   spec:
  #     file: cdviz-site/src/docs/cdviz-collector/quick-start.md
  #     matchpattern: 'releases/download/v?[0-9]+\.[0-9]+\.[0-9]+/'
  #     replacepattern: 'releases/download/{{ source "collectorVersion" }}/'

  miseUseCases:
    name: "bump cdviz-collector in demos/use_cases/mise.toml"
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: demos/use_cases/mise.toml
      matchpattern: '"github:cdviz-dev/cdviz-collector" = "(.*)"'
      replacepattern: '"github:cdviz-dev/cdviz-collector" = "{{ source "collectorVersion" }}"'

  miseSite:
    name: "bump cdviz-collector in cdviz-site/mise.toml"
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: cdviz-site/mise.toml
      matchpattern: '"github:cdviz-dev/cdviz-collector" = "(.*)"'
      replacepattern: '"github:cdviz-dev/cdviz-collector" = "{{ source "collectorVersion" }}"'

actions:
  collectorVersion:
    kind: github/pullrequest
    scmid: default
    targets:
      - valuesTag
      # - chartAppVersion
      # - docsInstallVersion
      # - docsQuickStartUrl
      - miseUseCases
      - miseSite
    spec:
      title: 'fix(deps): bump cdviz-collector to {{ source "collectorVersion" }}'
      labels:
        - dependencies
