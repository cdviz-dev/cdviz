---
# Propagate cdviz-collector releases across the monorepo.
#
# When a new release is tagged in cdviz-dev/cdviz-collector, this pipeline
# updates all version references in a single PR:
#   - charts/cdviz-collector/values.yaml  (image.tag)
#   - charts/cdviz-collector/Chart.yaml   (appVersion)
#   - cdviz-site/src/docs/cdviz-collector/install.md   (frontmatter version)
#   - cdviz-site/src/docs/cdviz-collector/quick-start.md  (installer URL)
scms:
  default:
    kind: github
    spec:
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      branch: '{{ .github.branch }}'

sources:
  collectorVersion:
    kind: githubrelease
    spec:
      owner: cdviz-dev
      repository: cdviz-collector
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimPrefix: "v"

targets:
  # Helm chart: image tag in values.yaml
  valuesTag:
    kind: yaml
    sourceid: collectorVersion
    scmid: default
    spec:
      file: charts/cdviz-collector/values.yaml
      key: $.image.tag

  # Helm chart: appVersion in Chart.yaml
  # Note: the inline comment "# version set during release" is preserved by
  # updatecli's yaml target because it uses goyaml which keeps comments.
  chartAppVersion:
    kind: yaml
    sourceid: collectorVersion
    scmid: default
    spec:
      file: charts/cdviz-collector/Chart.yaml
      key: $.appVersion

  # Docs: frontmatter `version:` field in install.md (used by {{ $params.version }})
  docsInstallVersion:
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: cdviz-site/src/docs/cdviz-collector/install.md
      matchPattern: '^version: [0-9]+\.[0-9]+\.[0-9]+'
      replacePattern: 'version: {{ source "collectorVersion" }}'

  # Docs: installer URL version in quick-start.md
  docsQuickStartUrl:
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: cdviz-site/src/docs/cdviz-collector/quick-start.md
      matchPattern: 'releases/download/[0-9]+\.[0-9]+\.[0-9]+/'
      replacePattern: 'releases/download/{{ source "collectorVersion" }}/'

pullrequests:
  collectorVersion:
    title: '[updatecli] Bump cdviz-collector to {{ source "collectorVersion" }}'
    targets:
      - valuesTag
      - chartAppVersion
      - docsInstallVersion
      - docsQuickStartUrl
    scmid: default
    labels:
      - dependencies
