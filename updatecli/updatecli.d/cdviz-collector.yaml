---
# Propagate cdviz-collector releases across the monorepo.
#
# When a new release is tagged in cdviz-dev/cdviz-collector, this pipeline
# updates all version references in a single PR:
#   - charts/cdviz-collector/values.yaml  (image.tag)
#   - charts/cdviz-collector/Chart.yaml   (appVersion)
#   - cdviz-site/src/docs/cdviz-collector/install.md   (frontmatter version field)
#   - cdviz-site/src/docs/cdviz-collector/quick-start.md  (installer URL)
scms:
  default:
    kind: github
    spec:
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      branch: '{{ .github.branch }}'

sources:
  collectorVersion:
    kind: githubrelease
    spec:
      owner: cdviz-dev
      repository: cdviz-collector
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  valuesTag:
    name: "charts/cdviz-collector/values.yaml image.tag"
    kind: yaml
    sourceid: collectorVersion
    scmid: default
    spec:
      file: charts/cdviz-collector/values.yaml
      key: $.image.tag

  chartAppVersion:
    name: "charts/cdviz-collector/Chart.yaml appVersion"
    kind: yaml
    sourceid: collectorVersion
    scmid: default
    spec:
      file: charts/cdviz-collector/Chart.yaml
      key: $.appVersion

  docsInstallVersion:
    name: "docs install.md frontmatter version"
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: cdviz-site/src/docs/cdviz-collector/install.md
      matchPattern: 'version: [0-9]+\.[0-9]+\.[0-9]+'
      replacePattern: 'version: {{ source "collectorVersion" }}'

  docsQuickStartUrl:
    name: "docs quick-start.md installer URL"
    kind: file
    sourceid: collectorVersion
    scmid: default
    spec:
      file: cdviz-site/src/docs/cdviz-collector/quick-start.md
      matchPattern: 'releases/download/v?[0-9]+\.[0-9]+\.[0-9]+/'
      replacePattern: 'releases/download/{{ source "collectorVersion" }}/'

actions:
  collectorVersion:
    kind: github/pullrequest
    scmid: default
    targets:
      - valuesTag
      - chartAppVersion
      - docsInstallVersion
      - docsQuickStartUrl
    spec:
      title: '[updatecli] Bump cdviz-collector to {{ source "collectorVersion" }}'
      labels:
        - dependencies
