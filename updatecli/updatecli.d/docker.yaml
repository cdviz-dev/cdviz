---
# Docker image updates.
#
# Skipped intentionally:
#   - timescale/timescaledb-ha:pg18   — major-version pin (pg18 = PostgreSQL 18)
#   - migrate/migrate:4               — major-version pin in cdviz-db/Dockerfile
#   - ghcr.io/cdviz-dev/*:latest      — internal images, always :latest in compose
#   - demos/stack-k8s manifests       — generated by Helmwave, not edited directly
scms:
  default:
    kind: github
    spec:
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      branch: '{{ .github.branch }}'

sources:
  grafanaOss:
    kind: dockerimage
    spec:
      image: grafana/grafana-oss
      versionFilter:
        kind: semver
        pattern: ">= 0"

targets:
  composeGrafana:
    name: "demos/stack-compose grafana/grafana-oss image tag"
    kind: file
    sourceid: grafanaOss
    scmid: default
    spec:
      file: demos/stack-compose/docker-compose.yaml
      matchPattern: 'grafana/grafana-oss:[0-9]+\.[0-9]+\.[0-9]+'
      replacePattern: 'grafana/grafana-oss:{{ source "grafanaOss" }}'

actions:
  grafanaOss:
    kind: github/pullrequest
    scmid: default
    targets:
      - composeGrafana
    spec:
      title: '[updatecli] Bump grafana/grafana-oss to {{ source "grafanaOss" }}'
      labels:
        - dependencies
