---
# Mise tool version pins.
#
# Excluded:
#   - helmwave (demos/stack-k8s/mise.toml)  — uses a complex TOML inline table
#     with special characters in the key ("ubi:helmwave/helmwave") that cannot
#     be reliably updated via regex or simple TOML key paths. See not-managed.txt.
#   - bun entries pinned to "latest" (cdviz-grafana-plugin.off, cdviz-site/perf)
#
# See ../README.md for conventions. Excluded deps are listed in its
# "Dependencies intentionally NOT managed" section.
name: "bump mise tool versions"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"
      commitmessage:
        type: fix
        scope: deps

sources:
  helm:
    name: "Get latest helm release"
    kind: githubrelease
    spec:
      owner: helm
      repository: helm
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kubectl:
    name: "Get latest kubectl release"
    kind: githubrelease
    spec:
      owner: kubernetes
      repository: kubernetes
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kind:
    name: "Get latest kind release"
    kind: githubrelease
    spec:
      owner: kubernetes-sigs
      repository: kind
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  ctlptl:
    name: "Get latest ctlptl release"
    kind: githubrelease
    spec:
      owner: tilt-dev
      repository: ctlptl
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  yq:
    name: "Get latest yq release"
    kind: githubrelease
    spec:
      owner: mikefarah
      repository: yq
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  gitcliff:
    name: "Get latest git-cliff release"
    kind: githubrelease
    spec:
      owner: orhun
      repository: git-cliff
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  bun:
    name: "Get latest bun release"
    kind: githubrelease
    spec:
      owner: oven-sh
      repository: bun
      versionfilter:
        kind: regex
        pattern: '^bun-v\d+\.\d+\.\d+$'
    transformers:
      - trimprefix: "bun-v"

  dprint:
    name: "Get latest dprint release"
    kind: githubrelease
    spec:
      owner: dprint
      repository: dprint
      versionfilter:
        kind: semver
        pattern: ">= 0"

  biome:
    name: "Get latest biome release"
    kind: githubrelease
    spec:
      owner: biomejs
      repository: biome
      versionfilter:
        kind: regex
        pattern: '^@biomejs/biome@\d+\.\d+\.\d+$'
    transformers:
      - trimprefix: "@biomejs/biome@"

  golangmigrate:
    name: "Get latest golang-migrate release"
    kind: githubrelease
    spec:
      owner: golang-migrate
      repository: migrate
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  sqruff:
    name: "Get latest sqruff release"
    kind: githubrelease
    spec:
      owner: quarylabs
      repository: sqruff
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  updatecliTool:
    name: "Get latest updatecli release"
    kind: githubrelease
    spec:
      owner: updatecli
      repository: updatecli
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  v8r:
    name: "Get latest v8r release"
    kind: githubrelease
    spec:
      owner: chris48s
      repository: v8r
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  helmCharts:
    name: "bump helm in charts/mise.toml"
    kind: file
    sourceid: helm
    scmid: default
    spec:
      file: charts/mise.toml
      matchpattern: 'helm = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'helm = "{{ source "helm" }}"'

  kubectlCollectorChart:
    name: "bump kubectl in charts/cdviz-collector/mise.toml"
    kind: file
    sourceid: kubectl
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      matchpattern: 'kubectl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kubectl = "{{ source "kubectl" }}"'

  kindCollectorChart:
    name: "bump kind in charts/cdviz-collector/mise.toml"
    kind: file
    sourceid: kind
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      matchpattern: 'kind = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kind = "{{ source "kind" }}"'

  kubectlStackK8s:
    name: "bump kubectl in demos/stack-k8s/mise.toml"
    kind: file
    sourceid: kubectl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'kubectl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kubectl = "{{ source "kubectl" }}"'

  kindStackK8s:
    name: "bump kind in demos/stack-k8s/mise.toml"
    kind: file
    sourceid: kind
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'kind = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kind = "{{ source "kind" }}"'

  ctlptlStackK8s:
    name: "bump ctlptl in demos/stack-k8s/mise.toml"
    kind: file
    sourceid: ctlptl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'ctlptl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'ctlptl = "{{ source "ctlptl" }}"'

  yqRoot:
    name: "bump yq in mise.toml"
    kind: file
    sourceid: yq
    scmid: default
    spec:
      file: mise.toml
      matchpattern: 'yq = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'yq = "{{ source "yq" }}"'

  yqGrafana:
    name: "bump yq in cdviz-grafana/mise.toml"
    kind: file
    sourceid: yq
    scmid: default
    spec:
      file: cdviz-grafana/mise.toml
      matchpattern: '"yq" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"yq" = "{{ source "yq" }}"'

  gitcliffRoot:
    name: "bump git-cliff in mise.toml"
    kind: file
    sourceid: gitcliff
    scmid: default
    spec:
      file: mise.toml
      matchpattern: 'git-cliff = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'git-cliff = "{{ source "gitcliff" }}"'

  bunDb:
    name: "bump bun in cdviz-db/mise.toml"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  bunSite:
    name: "bump bun in cdviz-site/mise.toml"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-site/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  bunDashboards:
    name: "bump bun in cdviz-grafana/dashboards_generator/mise.toml"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-grafana/dashboards_generator/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  dprintAdr:
    name: "bump dprint in adr/mise.toml"
    kind: file
    sourceid: dprint
    scmid: default
    spec:
      file: adr/mise.toml
      matchpattern: '"dprint" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"dprint" = "{{ source "dprint" }}"'

  dprintSite:
    name: "bump dprint in cdviz-site/mise.toml"
    kind: file
    sourceid: dprint
    scmid: default
    spec:
      file: cdviz-site/mise.toml
      matchpattern: '"dprint" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"dprint" = "{{ source "dprint" }}"'

  biomeDashboards:
    name: "bump biome in cdviz-grafana/dashboards_generator/mise.toml"
    kind: file
    sourceid: biome
    scmid: default
    spec:
      file: cdviz-grafana/dashboards_generator/mise.toml
      matchpattern: '"biome" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"biome" = "{{ source "biome" }}"'

  golangmigrateDb:
    name: "bump golang-migrate in cdviz-db/mise.toml"
    kind: file
    sourceid: golangmigrate
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"github:golang-migrate/migrate" = "(.*)"'
      replacepattern: '"github:golang-migrate/migrate" = "{{ source "golangmigrate" }}"'

  sqruffDb:
    name: "bump sqruff in cdviz-db/mise.toml"
    kind: file
    sourceid: sqruff
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"github:quarylabs/sqruff" = "(.*)"'
      replacepattern: '"github:quarylabs/sqruff" = "{{ source "sqruff" }}"'

  updatecliRoot:
    name: "bump updatecli in mise.toml"
    kind: file
    sourceid: updatecliTool
    scmid: default
    spec:
      file: mise.toml
      matchpattern: '"github:updatecli/updatecli" = "(.*)"'
      replacepattern: '"github:updatecli/updatecli" = "{{ source "updatecliTool" }}"'

  updatecliUpdatecli:
    name: "bump updatecli in updatecli/mise.toml"
    kind: file
    sourceid: updatecliTool
    scmid: default
    spec:
      file: updatecli/mise.toml
      matchpattern: '"github:updatecli/updatecli" = "(.*)"'
      replacepattern: '"github:updatecli/updatecli" = "{{ source "updatecliTool" }}"'

  v8rUpdatecli:
    name: "bump v8r in updatecli/mise.toml"
    kind: file
    sourceid: v8r
    scmid: default
    spec:
      file: updatecli/mise.toml
      matchpattern: '"github:chris48s/v8r" = "(.*)"'
      replacepattern: '"github:chris48s/v8r" = "{{ source "v8r" }}"'

# All targets share `scmid: default`, so updatecli pushes them to one branch
# and opens a single PR. A per-tool action would produce a misleading PR title
# (only one tool named) for that combined PR, so a single generic action is used.
# Omitting `targets:` associates every target on this scm. See ../README.md.
actions:
  deps:
    kind: github/pullrequest
    scmid: default
    spec:
      title: "fix(deps): bump mise tool versions"
      labels:
        - dependencies
