---
# Mise tool version pins.
#
# Excluded:
#   - helmwave (demos/stack-k8s/mise.toml)  — uses a complex TOML inline table
#     with special characters in the key ("ubi:helmwave/helmwave") that cannot
#     be reliably updated via regex or simple TOML key paths. See not-managed.txt.
#   - bun entries pinned to "latest" (cdviz-grafana-plugin.off, cdviz-site/perf)
name: "bump mise tool versions"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

sources:
  helm:
    name: "Get latest helm release"
    kind: githubrelease
    spec:
      owner: helm
      repository: helm
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kubectl:
    name: "Get latest kubectl release"
    kind: githubrelease
    spec:
      owner: kubernetes
      repository: kubernetes
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kind:
    name: "Get latest kind release"
    kind: githubrelease
    spec:
      owner: kubernetes-sigs
      repository: kind
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  ctlptl:
    name: "Get latest ctlptl release"
    kind: githubrelease
    spec:
      owner: tilt-dev
      repository: ctlptl
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  yq:
    name: "Get latest yq release"
    kind: githubrelease
    spec:
      owner: mikefarah
      repository: yq
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  gitcliff:
    name: "Get latest git-cliff release"
    kind: githubrelease
    spec:
      owner: orhun
      repository: git-cliff
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  bun:
    name: "Get latest bun release"
    kind: githubrelease
    spec:
      owner: oven-sh
      repository: bun
      versionfilter:
        kind: regex
        pattern: '^bun-v\d+\.\d+\.\d+$'
    transformers:
      - trimprefix: "bun-v"

  dprint:
    name: "Get latest dprint release"
    kind: githubrelease
    spec:
      owner: dprint
      repository: dprint
      versionfilter:
        kind: semver
        pattern: ">= 0"

  biome:
    name: "Get latest biome release"
    kind: githubrelease
    spec:
      owner: biomejs
      repository: biome
      versionfilter:
        kind: regex
        pattern: '^cli/v\d+\.\d+\.\d+$'
    transformers:
      - trimprefix: "cli/v"

  golangmigrate:
    name: "Get latest golang-migrate release"
    kind: githubrelease
    spec:
      owner: golang-migrate
      repository: migrate
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  sqruff:
    name: "Get latest sqruff release"
    kind: githubrelease
    spec:
      owner: quarylabs
      repository: sqruff
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  updatecliTool:
    name: "Get latest updatecli release"
    kind: githubrelease
    spec:
      owner: updatecli
      repository: updatecli
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  v8r:
    name: "Get latest v8r release"
    kind: githubrelease
    spec:
      owner: chris48s
      repository: v8r
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  helmCharts:
    name: "charts/mise.toml helm version"
    kind: file
    sourceid: helm
    scmid: default
    spec:
      file: charts/mise.toml
      matchpattern: 'helm = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'helm = "{{ source "helm" }}"'

  kubectlCollectorChart:
    name: "charts/cdviz-collector/mise.toml kubectl version"
    kind: file
    sourceid: kubectl
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      matchpattern: 'kubectl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kubectl = "{{ source "kubectl" }}"'

  kindCollectorChart:
    name: "charts/cdviz-collector/mise.toml kind version"
    kind: file
    sourceid: kind
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      matchpattern: 'kind = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kind = "{{ source "kind" }}"'

  kubectlStackK8s:
    name: "demos/stack-k8s/mise.toml kubectl version"
    kind: file
    sourceid: kubectl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'kubectl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kubectl = "{{ source "kubectl" }}"'

  kindStackK8s:
    name: "demos/stack-k8s/mise.toml kind version"
    kind: file
    sourceid: kind
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'kind = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'kind = "{{ source "kind" }}"'

  ctlptlStackK8s:
    name: "demos/stack-k8s/mise.toml ctlptl version"
    kind: file
    sourceid: ctlptl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchpattern: 'ctlptl = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'ctlptl = "{{ source "ctlptl" }}"'

  yqRoot:
    name: "mise.toml yq version"
    kind: file
    sourceid: yq
    scmid: default
    spec:
      file: mise.toml
      matchpattern: 'yq = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'yq = "{{ source "yq" }}"'

  yqGrafana:
    name: "cdviz-grafana/mise.toml yq version"
    kind: file
    sourceid: yq
    scmid: default
    spec:
      file: cdviz-grafana/mise.toml
      matchpattern: '"yq" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"yq" = "{{ source "yq" }}"'

  gitcliffRoot:
    name: "mise.toml git-cliff version"
    kind: file
    sourceid: gitcliff
    scmid: default
    spec:
      file: mise.toml
      matchpattern: 'git-cliff = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: 'git-cliff = "{{ source "gitcliff" }}"'

  bunDb:
    name: "cdviz-db/mise.toml bun version"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  bunSite:
    name: "cdviz-site/mise.toml bun version"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-site/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  bunDashboards:
    name: "cdviz-grafana/dashboards_generator/mise.toml bun version"
    kind: file
    sourceid: bun
    scmid: default
    spec:
      file: cdviz-grafana/dashboards_generator/mise.toml
      matchpattern: '"bun" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"bun" = "{{ source "bun" }}"'

  dprintAdr:
    name: "adr/mise.toml dprint version"
    kind: file
    sourceid: dprint
    scmid: default
    spec:
      file: adr/mise.toml
      matchpattern: '"dprint" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"dprint" = "{{ source "dprint" }}"'

  dprintSite:
    name: "cdviz-site/mise.toml dprint version"
    kind: file
    sourceid: dprint
    scmid: default
    spec:
      file: cdviz-site/mise.toml
      matchpattern: '"dprint" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"dprint" = "{{ source "dprint" }}"'

  biomeDashboards:
    name: "cdviz-grafana/dashboards_generator/mise.toml biome version"
    kind: file
    sourceid: biome
    scmid: default
    spec:
      file: cdviz-grafana/dashboards_generator/mise.toml
      matchpattern: '"biome" = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacepattern: '"biome" = "{{ source "biome" }}"'

  golangmigrateDb:
    name: "cdviz-db/mise.toml golang-migrate version"
    kind: file
    sourceid: golangmigrate
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"github:golang-migrate/migrate" = "(.*)"'
      replacepattern: '"github:golang-migrate/migrate" = "{{ source "golangmigrate" }}"'

  sqruffDb:
    name: "cdviz-db/mise.toml sqruff version"
    kind: file
    sourceid: sqruff
    scmid: default
    spec:
      file: cdviz-db/mise.toml
      matchpattern: '"github:quarylabs/sqruff" = "(.*)"'
      replacepattern: '"github:quarylabs/sqruff" = "{{ source "sqruff" }}"'

  updatecliRoot:
    name: "mise.toml updatecli version"
    kind: file
    sourceid: updatecliTool
    scmid: default
    spec:
      file: mise.toml
      matchpattern: '"github:updatecli/updatecli" = "(.*)"'
      replacepattern: '"github:updatecli/updatecli" = "{{ source "updatecliTool" }}"'

  updatecliUpdatecli:
    name: "updatecli/mise.toml updatecli version"
    kind: file
    sourceid: updatecliTool
    scmid: default
    spec:
      file: updatecli/mise.toml
      matchpattern: '"github:updatecli/updatecli" = "(.*)"'
      replacepattern: '"github:updatecli/updatecli" = "{{ source "updatecliTool" }}"'

  v8rUpdatecli:
    name: "updatecli/mise.toml v8r version"
    kind: file
    sourceid: v8r
    scmid: default
    spec:
      file: updatecli/mise.toml
      matchpattern: '"github:chris48s/v8r" = "(.*)"'
      replacepattern: '"github:chris48s/v8r" = "{{ source "v8r" }}"'

actions:
  helm:
    kind: github/pullrequest
    scmid: default
    targets:
      - helmCharts
    spec:
      title: 'fix(deps): Bump helm to {{ source "helm" }}'
      labels:
        - dependencies

  kubectl:
    kind: github/pullrequest
    scmid: default
    targets:
      - kubectlCollectorChart
      - kubectlStackK8s
    spec:
      title: 'fix(deps): Bump kubectl to {{ source "kubectl" }}'
      labels:
        - dependencies

  kind:
    kind: github/pullrequest
    scmid: default
    targets:
      - kindCollectorChart
      - kindStackK8s
    spec:
      title: 'fix(deps): Bump kind to {{ source "kind" }}'
      labels:
        - dependencies

  ctlptl:
    kind: github/pullrequest
    scmid: default
    targets:
      - ctlptlStackK8s
    spec:
      title: 'fix(deps): Bump ctlptl to {{ source "ctlptl" }}'
      labels:
        - dependencies

  yq:
    kind: github/pullrequest
    scmid: default
    targets:
      - yqRoot
      - yqGrafana
    spec:
      title: 'fix(deps): Bump yq to {{ source "yq" }}'
      labels:
        - dependencies

  gitcliff:
    kind: github/pullrequest
    scmid: default
    targets:
      - gitcliffRoot
    spec:
      title: 'fix(deps): Bump git-cliff to {{ source "gitcliff" }}'
      labels:
        - dependencies

  bun:
    kind: github/pullrequest
    scmid: default
    targets:
      - bunDb
      - bunSite
      - bunDashboards
    spec:
      title: 'fix(deps): Bump bun to {{ source "bun" }}'
      labels:
        - dependencies

  dprint:
    kind: github/pullrequest
    scmid: default
    targets:
      - dprintAdr
      - dprintSite
    spec:
      title: 'fix(deps): Bump dprint to {{ source "dprint" }}'
      labels:
        - dependencies

  biome:
    kind: github/pullrequest
    scmid: default
    targets:
      - biomeDashboards
    spec:
      title: 'fix(deps): Bump biome to {{ source "biome" }}'
      labels:
        - dependencies

  golangmigrate:
    kind: github/pullrequest
    scmid: default
    targets:
      - golangmigrateDb
    spec:
      title: 'fix(deps): Bump golang-migrate to {{ source "golangmigrate" }}'
      labels:
        - dependencies

  sqruff:
    kind: github/pullrequest
    scmid: default
    targets:
      - sqruffDb
    spec:
      title: 'fix(deps): Bump sqruff to {{ source "sqruff" }}'
      labels:
        - dependencies

  updatecliTool:
    kind: github/pullrequest
    scmid: default
    targets:
      - updatecliRoot
      - updatecliUpdatecli
    spec:
      title: 'fix(deps): Bump updatecli to {{ source "updatecliTool" }}'
      labels:
        - dependencies

  v8r:
    kind: github/pullrequest
    scmid: default
    targets:
      - v8rUpdatecli
    spec:
      title: 'fix(deps): Bump v8r to {{ source "v8r" }}'
      labels:
        - dependencies
