---
# Mise tool version pins.
#
# Tools left at "latest" (bun, yq, git-cliff, dprint, biome, golang-migrate,
# sqruff) are intentionally not pinned — they resolve at install time.
#
# Excluded:
#   - helmwave (demos/stack-k8s/mise.toml)  — uses a complex TOML inline table
#     with special characters in the key ("ubi:helmwave/helmwave") that cannot
#     be reliably updated via regex or simple TOML key paths. See not-managed.txt.
name: "bump mise tool versions"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

sources:
  helm:
    name: "Get latest helm release"
    kind: githubrelease
    spec:
      owner: helm
      repository: helm
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kubectl:
    name: "Get latest kubectl release"
    kind: githubrelease
    spec:
      owner: kubernetes
      repository: kubernetes
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kind:
    name: "Get latest kind release"
    kind: githubrelease
    spec:
      owner: kubernetes-sigs
      repository: kind
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  ctlptl:
    name: "Get latest ctlptl release"
    kind: githubrelease
    spec:
      owner: tilt-dev
      repository: ctlptl
      versionfilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  helmCharts:
    name: "charts/mise.toml helm version"
    kind: toml
    sourceid: helm
    scmid: default
    spec:
      file: charts/mise.toml
      key: tools.helm

  kubectlCollectorChart:
    name: "charts/cdviz-collector/mise.toml kubectl version"
    kind: toml
    sourceid: kubectl
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      key: tools.kubectl

  kindCollectorChart:
    name: "charts/cdviz-collector/mise.toml kind version"
    kind: toml
    sourceid: kind
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      key: tools.kind

  kubectlStackK8s:
    name: "demos/stack-k8s/mise.toml kubectl version"
    kind: toml
    sourceid: kubectl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.kubectl

  kindStackK8s:
    name: "demos/stack-k8s/mise.toml kind version"
    kind: toml
    sourceid: kind
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.kind

  ctlptlStackK8s:
    name: "demos/stack-k8s/mise.toml ctlptl version"
    kind: toml
    sourceid: ctlptl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.ctlptl

actions:
  helm:
    kind: github/pullrequest
    scmid: default
    targets:
      - helmCharts
    spec:
      title: 'fix(deps): Bump helm to {{ source "helm" }}'
      labels:
        - dependencies

  kubectl:
    kind: github/pullrequest
    scmid: default
    targets:
      - kubectlCollectorChart
      - kubectlStackK8s
    spec:
      title: 'fix(deps): Bump kubectl to {{ source "kubectl" }}'
      labels:
        - dependencies

  kind:
    kind: github/pullrequest
    scmid: default
    targets:
      - kindCollectorChart
      - kindStackK8s
    spec:
      title: 'fix(deps): Bump kind to {{ source "kind" }}'
      labels:
        - dependencies

  ctlptl:
    kind: github/pullrequest
    scmid: default
    targets:
      - ctlptlStackK8s
    spec:
      title: 'fix(deps): Bump ctlptl to {{ source "ctlptl" }}'
      labels:
        - dependencies

