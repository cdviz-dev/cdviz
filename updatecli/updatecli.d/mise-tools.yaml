---
# Mise tool version pins.
#
# Tools left at "latest" (bun, yq, git-cliff, dprint, biome, golang-migrate,
# sqruff) are intentionally not pinned — they resolve at install time.
scms:
  default:
    kind: github
    spec:
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      branch: '{{ .github.branch }}'

sources:
  helm:
    kind: githubrelease
    spec:
      owner: helm
      repository: helm
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kubectl:
    kind: githubrelease
    spec:
      owner: kubernetes
      repository: kubernetes
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  kind:
    kind: githubrelease
    spec:
      owner: kubernetes-sigs
      repository: kind
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  ctlptl:
    kind: githubrelease
    spec:
      owner: tilt-dev
      repository: ctlptl
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

  helmwave:
    kind: githubrelease
    spec:
      owner: helmwave
      repository: helmwave
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionFilter:
        kind: semver
        pattern: ">= 0"
    transformers:
      - trimprefix: "v"

targets:
  helmCharts:
    name: "charts/mise.toml helm version"
    kind: toml
    sourceid: helm
    scmid: default
    spec:
      file: charts/mise.toml
      key: tools.helm

  kubectlCollectorChart:
    name: "charts/cdviz-collector/mise.toml kubectl version"
    kind: toml
    sourceid: kubectl
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      key: tools.kubectl

  kindCollectorChart:
    name: "charts/cdviz-collector/mise.toml kind version"
    kind: toml
    sourceid: kind
    scmid: default
    spec:
      file: charts/cdviz-collector/mise.toml
      key: tools.kind

  kubectlStackK8s:
    name: "demos/stack-k8s/mise.toml kubectl version"
    kind: toml
    sourceid: kubectl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.kubectl

  kindStackK8s:
    name: "demos/stack-k8s/mise.toml kind version"
    kind: toml
    sourceid: kind
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.kind

  ctlptlStackK8s:
    name: "demos/stack-k8s/mise.toml ctlptl version"
    kind: toml
    sourceid: ctlptl
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      key: tools.ctlptl

  helmwaveStackK8s:
    name: "demos/stack-k8s/mise.toml helmwave version"
    kind: file
    sourceid: helmwave
    scmid: default
    spec:
      file: demos/stack-k8s/mise.toml
      matchPattern: '"ubi:helmwave/helmwave" = \{ version = "[0-9]+\.[0-9]+\.[0-9]+"'
      replacePattern: '"ubi:helmwave/helmwave" = { version = "{{ source "helmwave" }}"'

actions:
  helm:
    kind: github/pullrequest
    scmid: default
    targets:
      - helmCharts
    spec:
      title: '[updatecli] Bump helm to {{ source "helm" }}'
      labels:
        - dependencies

  kubectl:
    kind: github/pullrequest
    scmid: default
    targets:
      - kubectlCollectorChart
      - kubectlStackK8s
    spec:
      title: '[updatecli] Bump kubectl to {{ source "kubectl" }}'
      labels:
        - dependencies

  kind:
    kind: github/pullrequest
    scmid: default
    targets:
      - kindCollectorChart
      - kindStackK8s
    spec:
      title: '[updatecli] Bump kind to {{ source "kind" }}'
      labels:
        - dependencies

  ctlptl:
    kind: github/pullrequest
    scmid: default
    targets:
      - ctlptlStackK8s
    spec:
      title: '[updatecli] Bump ctlptl to {{ source "ctlptl" }}'
      labels:
        - dependencies

  helmwave:
    kind: github/pullrequest
    scmid: default
    targets:
      - helmwaveStackK8s
    spec:
      title: '[updatecli] Bump helmwave to {{ source "helmwave" }}'
      labels:
        - dependencies
