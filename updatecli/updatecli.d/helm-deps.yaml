---
# Helm chart dependency: kubewatch (sub-chart of cdviz-collector).
name: "bump Helm chart dependencies"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

sources:
  kubewatch:
    name: "Get latest kubewatch chart version"
    kind: helmchart
    spec:
      url: https://robusta-charts.storage.googleapis.com
      name: kubewatch
      versionfilter:
        kind: semver
        pattern: ">= 0"

targets:
  kubewatchVersion:
    name: "charts/cdviz-collector/Chart.yaml kubewatch dependency version"
    kind: file
    sourceid: kubewatch
    scmid: default
    spec:
      file: charts/cdviz-collector/Chart.yaml
      matchpattern: '    version: [0-9]+\.[0-9]+\.[0-9]+'
      replacepattern: '    version: {{ source "kubewatch" }}'

actions:
  kubewatch:
    kind: github/pullrequest
    scmid: default
    targets:
      - kubewatchVersion
    spec:
      title: 'fix(deps): Bump kubewatch to {{ source "kubewatch" }}'
      labels:
        - dependencies
