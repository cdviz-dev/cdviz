---
# Helm chart dependency: kubewatch (sub-chart of cdviz-collector).
name: "bump Helm chart dependencies"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

sources:
  kubewatch:
    name: "Get latest kubewatch chart version"
    kind: helmchart
    spec:
      url: https://robusta-charts.storage.googleapis.com
      name: kubewatch
      versionfilter:
        kind: semver
        pattern: ">= 0"

targets:
  kubewatchVersion:
    name: "charts/cdviz-collector/Chart.yaml kubewatch dependency version"
    kind: yaml
    sourceid: kubewatch
    scmid: default
    spec:
      file: charts/cdviz-collector/Chart.yaml
      key: "$.dependencies[0].version"

actions:
  kubewatch:
    kind: github/pullrequest
    scmid: default
    targets:
      - kubewatchVersion
    spec:
      title: '[updatecli] Bump kubewatch to {{ source "kubewatch" }}'
      labels:
        - dependencies
