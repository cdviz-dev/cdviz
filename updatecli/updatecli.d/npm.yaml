---
# npm dependencies for cdviz-site.
# One PR bundles all package updates.
#
# Excluded (managed manually):
#   - vitepress: alpha track (^2.0.0-alpha.x); re-enable once 2.x is stable.
name: "bump cdviz-site npm dependencies"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      title: "fix(deps): Bump npm devDependencies in cdviz-site"
      labels:
        - dependencies

autodiscovery:
  scmid: default
  actionid: default
  groupby: all
  crawlers:
    npm:
      rootdir: cdviz-site
      versionfilter:
        kind: latest
      ignore:
        - packages:
            vitepress: ".*"

