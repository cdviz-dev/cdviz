---
# npm packages for cdviz-site (devDependencies).
# Each matrix entry → separate PR updating package.json + regenerating bun.lock.
#
# Excluded (manage manually):
#   - vitepress: alpha track (^2.0.0-alpha.x); re-enable once 2.x is stable.
name: "bump cdviz-site npm dependencies"

matrix:
  packages:
    - "@iconify-json/lucide"
    - "@iconify-json/mdi"
    - "@iconify-json/simple-icons"
    - "@iconify/tailwind4"
    - "@tailwindcss/vite"
    - gsap
    - prettier
    - prettier-plugin-tailwindcss
    - tailwindcss
    - vite-svg-loader

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

sources:
  npm:
    name: "Get latest {{ .matrix.packages }} version"
    kind: npm
    spec:
      name: "{{ .matrix.packages }}"
      versionfilter:
        kind: latest

targets:
  packageJson:
    name: "cdviz-site package.json {{ .matrix.packages }}"
    kind: json
    sourceid: npm
    scmid: default
    spec:
      file: cdviz-site/package.json
      key: '.devDependencies["{{ .matrix.packages }}"]'

  bunInstall:
    name: "cdviz-site bun.lock regeneration"
    kind: shell
    scmid: default
    dependson:
      - packageJson
    spec:
      command: bun install --cwd cdviz-site

actions:
  npm:
    kind: github/pullrequest
    scmid: default
    targets:
      - packageJson
      - bunInstall
    spec:
      title: "[updatecli] Bump {{ .matrix.packages }} in cdviz-site"
      labels:
        - dependencies

