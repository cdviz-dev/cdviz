---
# Autodiscovery for GitHub Actions: detects all `uses: owner/repo@vX` lines
# in .github/workflows/*.yml and bumps them to the latest release tag.
name: "bump GitHub Actions versions"

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.user }}"
      username: "{{ .github.username }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      branch: "{{ .github.branch }}"

autodiscovery:
  scmid: default
  crawlers:
    githubactions:
      scmid: default
      spec:
        rootdir: "."
      actions:
        default:
          kind: github/pullrequest
          scmid: default
          spec:
            title: "[updatecli] Bump GitHub Actions"
            labels:
              - dependencies
